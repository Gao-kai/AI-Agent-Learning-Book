services:
  postgres:
    image: postgres:16-alpine
    container_name: langgraph-postgres
    environment:
      POSTGRES_USER: booker
      POSTGRES_PASSWORD: Manul1fe
      POSTGRES_DB: langchain_demo
    ports:
      - "5432:5432"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/postgresql:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booker -d langchain_demo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
